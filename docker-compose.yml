# SwitchDex — full application stack.
# `docker compose up -d` brings up the entire platform.
# On the appliance image this is started automatically at boot.

services:
  # ── TLS front door + static frontend host + reverse proxy ────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # ── FastAPI: REST API + WebSocket SSH proxy ──────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CONFIG_REPO: /data/config-repo
    volumes:
      - config_repo:/data/config-repo
    depends_on:
      db:
        condition: service_healthy

  # ── Scheduler: daily config backups + change detection ───────────────
  scheduler:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CONFIG_REPO: /data/config-repo
    volumes:
      - config_repo:/data/config-repo
    depends_on:
      db:
        condition: service_healthy

  # ── Postgres: inventory, archive metadata, users ─────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:        # database
  config_repo:    # git-backed running-config archive
  caddy_data:     # TLS certs
  caddy_config:
